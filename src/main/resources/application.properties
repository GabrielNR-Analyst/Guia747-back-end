spring.datasource.url=${GUIA747_DATASOURCE_URL:jdbc:postgresql://localhost:5432/guia747}
spring.datasource.username=${GUIA747_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${GUIA747_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${GUIA747_DATASOURCE_DRIVER_CLASSNAME:org.postgresql.Driver}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

spring.security.oauth2.client.registration.google.client-id=${GUIA747_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GUIA747_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/login/oauth2/google/callback
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-name-attribute=sub
